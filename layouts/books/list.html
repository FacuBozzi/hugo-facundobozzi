{{ define "main" }}
<content>
  <h1>{{ .Title }}</h1>

  <p>these are the books that I consider essentials. must-reads.</p>

  {{ if site.Data.books }}
    <ul class="books-list">
      {{ range site.Data.books }}
        <li>
          <span>{{ .title }}</span><span class="book-author"> — {{ .author }}</span>
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p>no books yet.</p>
  {{ end }}

  <style>
    .books-list {
      list-style: none;
      padding: 0;
    }
    .books-list li {
      margin-bottom: 0.5em;
    }
    .books-list .book-author {
      opacity: 0.6;
    }
  </style>
</content>
{{ end }}
