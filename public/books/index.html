<content>
  <h1>books</h1>

  <p>these are the books that I consider essentials. must-reads.</p>

  <div id="books-loading">loading...</div>
  <div id="books-error" style="display:none"></div>
  <ul id="books-list" class="books-list" style="display:none"></ul>

  <style>
    .books-list {
      list-style: none;
      padding: 0;
    }
    .books-list li {
      margin-bottom: 0.5em;
    }
    .books-list .book-author {
      opacity: 0.6;
    }
  </style>

  <script>
    (function () {
      var supabaseUrl = "https://upkfrqwsuuuacletsyoa.supabase.co";
      var supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwa2ZycXdzdXV1YWNsZXRzeW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MTM5MzQsImV4cCI6MjA4NzE4OTkzNH0.N9i-gv5lJlNnsZH9aJd0TwxyAgf5lNQT1I2MLSSAVHQ";

      var loadingEl = document.getElementById("books-loading");
      var errorEl = document.getElementById("books-error");
      var listEl = document.getElementById("books-list");

      function showError(msg) {
        loadingEl.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = msg;
      }

      function showBooks(books) {
        loadingEl.style.display = "none";
        if (books.length === 0) {
          errorEl.style.display = "block";
          errorEl.textContent = "no books yet.";
          return;
        }
        listEl.style.display = "block";
        books.forEach(function (book) {
          var li = document.createElement("li");
          var title = document.createElement("span");
          title.textContent = book.title;
          var author = document.createElement("span");
          author.className = "book-author";
          author.textContent = " — " + book.author;
          li.appendChild(title);
          li.appendChild(author);
          listEl.appendChild(li);
        });
      }

      var controller = new AbortController();
      var timeoutId = setTimeout(function () { controller.abort(); }, 10000);

      fetch(supabaseUrl + "/rest/v1/book_recommendations?select=*&order=id.asc", {
        headers: {
          "apikey": supabaseKey,
          "Authorization": "Bearer " + supabaseKey
        },
        signal: controller.signal
      })
        .then(function (res) {
          clearTimeout(timeoutId);
          if (!res.ok) {
            console.error("Supabase error:", res.status, res.statusText);
            throw new Error("HTTP " + res.status);
          }
          return res.json();
        })
        .then(function (data) {
          showBooks(data);
        })
        .catch(function (err) {
          clearTimeout(timeoutId);
          console.error("Failed to load books:", err);
          showError("couldn't load books — please try again later.");
        });
    })();
  </script>
